{% extends "base.html" %}

{% block title %}Diabetes Risk Assessment{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2 class="mb-4">Diabetes Risk Assessment</h2>
        <p>Please provide the following information:</p>
        
        <form method="POST" action="/diabetes">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="HighBP" class="form-label">High Blood Pressure:</label>
                        <select class="form-select" id="HighBP" name="HighBP" required>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="BMI" class="form-label">Body Mass Index (BMI):</label>
                        <input type="number" step="0.1" class="form-control" id="BMI" name="BMI" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="GenHlth" class="form-label">General Health (1-5):</label>
                        <select class="form-select" id="GenHlth" name="GenHlth" required>
                            <option value="1">1 - Excellent</option>
                            <option value="2">2 - Very Good</option>
                            <option value="3" selected>3 - Good</option>
                            <option value="4">4 - Fair</option>
                            <option value="5">5 - Poor</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="PhysHlth" class="form-label">Physical Health Days (0-30):</label>
                        <input type="number" min="0" max="30" class="form-control" id="PhysHlth" name="PhysHlth" value="0" required>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="MentHlth" class="form-label">Mental Health Days (0-30):</label>
                        <input type="number" min="0" max="30" class="form-control" id="MentHlth" name="MentHlth" value="0" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="Age" class="form-label">Age Group:</label>
                        <select class="form-select" id="Age" name="Age" required>
                            <option value="1">18-24</option>
                            <option value="2">25-29</option>
                            <option value="3">30-34</option>
                            <option value="4">35-39</option>
                            <option value="5">40-44</option>
                            <option value="6">45-49</option>
                            <option value="7">50-54</option>
                            <option value="8">55-59</option>
                            <option value="9">60-64</option>
                            <option value="10">65-69</option>
                            <option value="11">70-74</option>
                            <option value="12">75-79</option>
                            <option value="13">80+</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="Education" class="form-label">Education Level:</label>
                        <select class="form-select" id="Education" name="Education" required>
                            <option value="1">Never attended school</option>
                            <option value="2">Elementary (1-8)</option>
                            <option value="3">Some high school (9-11)</option>
                            <option value="4" selected>High school graduate</option>
                            <option value="5">Some college</option>
                            <option value="6">College graduate</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="Income" class="form-label">Income Level:</label>
                        <select class="form-select" id="Income" name="Income" required>
                            <option value="1">Less than $10,000</option>
                            <option value="2">$10,000-$15,000</option>
                            <option value="3">$15,000-$20,000</option>
                            <option value="4">$20,000-$25,000</option>
                            <option value="5">$25,000-$35,000</option>
                            <option value="6" selected>$35,000-$50,000</option>
                            <option value="7">$50,000-$75,000</option>
                            <option value="8">$75,000+</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Assess Diabetes Risk</button>
        </form>
    </div>
</div>
{% endblock %}
